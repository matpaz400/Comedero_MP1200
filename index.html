<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">
  <div class="modal" onclick="event.stopPropagation()">

    <div class="modal-handle"></div>
    <div class="modal-title">Nuevo horario</div>

    <div class="form-group">
      <label class="form-label">Hora</label>
      <input type="time" class="form-input" id="modal-time" value="08:00">
    </div>

    <div class="form-group">
      <label class="form-label">Cantidad</label>
      <input type="number" class="form-input" id="modal-grams" value="150">
    </div>

    <div class="form-group">
      <label class="form-label">Días</label>
      <div class="days-selector">
        <button class="day-btn active" data-day="L">L</button>
        <button class="day-btn active" data-day="M">M</button>
        <button class="day-btn active" data-day="X">X</button>
        <button class="day-btn active" data-day="J">J</button>
        <button class="day-btn active" data-day="V">V</button>
        <button class="day-btn active" data-day="S">S</button>
        <button class="day-btn active" data-day="D">D</button>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveSchedule()">Guardar horario</button>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== TU LÓGICA ORIGINAL (NO TOCADA) =====
// (mantén todas tus funciones: renderSchedules, dispense, etc.)

// 🔥 SOLO ESTA FUNCIÓN CORREGIDA
function saveSchedule() {

  const time = document.getElementById('modal-time').value;
  const grams = parseInt(document.getElementById('modal-grams').value);
  const days = [...document.querySelectorAll('.day-btn.active')].map(b => b.dataset.day);

  if (!time || !grams || days.length === 0) {
    showToast('Completa todos los campos', 'error');
    return;
  }

  const newSchedule = { time, grams, days, enabled: true };

  // 🔥 Firebase
  if (window.guardarEnFirebase) {
    window.guardarEnFirebase(newSchedule)
      .then(() => showToast('✓ Guardado en la nube', 'success'))
      .catch(() => showToast('Error al guardar', 'error'));
  }

  const newId = Math.max(0, ...schedules.map(s => s.id)) + 1;

  schedules.push({ id: newId, time, grams, days, enabled: true });
  schedules.sort((a,b) => a.time.localeCompare(b.time));

  renderSchedules();
  closeModal();
  showToast('✓ Horario guardado', 'success');
}
</script>
