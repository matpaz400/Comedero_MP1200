<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PawFeeder — Comedero inteligente</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>
/* (TODO TU CSS ORIGINAL SIN CAMBIOS) */
</style>
</head>

<body>
<div class="app">

<header>
  <div class="logo">
    <div class="logo-icon">🐾</div>
    <div class="logo-name">Paw<span>Feeder</span></div>
  </div>
  <div class="status-dot">
    <div class="dot"></div>
    <span>Conectado</span>
  </div>
</header>

<div class="view active" id="view-home">
  <!-- TODO TU HTML ORIGINAL -->
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title">Nuevo horario</div>

    <input type="time" id="modal-time" value="08:00">
    <input type="number" id="modal-grams" value="150">

    <div class="days-selector">
      <button class="day-btn active" data-day="L">L</button>
      <button class="day-btn active" data-day="M">M</button>
      <button class="day-btn active" data-day="X">X</button>
      <button class="day-btn active" data-day="J">J</button>
      <button class="day-btn active" data-day="V">V</button>
      <button class="day-btn active" data-day="S">S</button>
      <button class="day-btn active" data-day="D">D</button>
    </div>

    <button onclick="saveSchedule()">Guardar horario</button>
  </div>
</div>

<script>
// 🔥 ESTADO
let schedules = [];

// 🔥 ACTIVAR BOTONES DE DÍAS
document.querySelectorAll('.day-btn').forEach(btn=>{
  btn.onclick = () => btn.classList.toggle('active');
});

// 🔥 MODAL
function openModal(){ document.getElementById('modal').classList.add('open'); }
function closeModal(){ document.getElementById('modal').classList.remove('open'); }
function closeModalOutside(e){
  if(e.target.id === "modal") closeModal();
}

// 🔥 SAVE CORREGIDO
function saveSchedule() {

  const time = document.getElementById('modal-time').value;
  const grams = parseInt(document.getElementById('modal-grams').value);
  const days = [...document.querySelectorAll('.day-btn.active')].map(b => b.dataset.day);

  if (!time || !grams || days.length === 0) {
    alert("Completa todo");
    return;
  }

  const newSchedule = { time, grams, days };

  // 🔥 FIREBASE
  if(window.guardarEnFirebase){
    window.guardarEnFirebase(newSchedule)
      .then(()=>console.log("guardado"))
      .catch(()=>console.log("error"));
  }

  schedules.push(newSchedule);
  console.log(schedules);

  closeModal();
}
</script>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "comedero-iot-7fa48.firebaseapp.com",
  databaseURL: "https://comedero-iot-7fa48-default-rtdb.firebaseio.com",
  projectId: "comedero-iot-7fa48"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

window.guardarEnFirebase = function(data){
  return db.ref("comedero/horarios/" + Date.now()).set(data);
};
</script>

</body>
</html>
