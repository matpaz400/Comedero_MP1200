<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PawFeeder — Comedero inteligente</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{margin:0;background:#0d0f0e;color:#e8ede9;font-family:'Syne',sans-serif;}
.app{max-width:480px;margin:auto;padding-bottom:100px}
header{display:flex;justify-content:space-between;padding:20px}
.section{margin:16px}
button{cursor:pointer}
.bottom-nav{position:fixed;bottom:0;width:100%;max-width:480px;display:flex;background:#111}
.nav-item{flex:1;padding:12px;background:none;border:none;color:#aaa}
.nav-item.active{color:#7FE4A0}
.modal{position:fixed;bottom:0;width:100%;max-width:480px;background:#161918;padding:20px;display:none}
.form-input{width:100%;padding:10px;margin-bottom:10px}
</style>
</head>

<body>

<div class="app">

<header>
<h2>PawFeeder</h2>
<span id="conn-text">🟢 Online</span>
</header>

<!-- HOME -->
<div id="view-home">
<div class="section">
<h3>Dispensar</h3>
<input type="number" id="custom-g" placeholder="gramos">
<button onclick="dispense()">Dispensar</button>
</div>
</div>

<!-- HORARIOS -->
<div id="view-schedules" style="display:none">
<div class="section">
<h3>Horarios</h3>
<div id="schedule-list"></div>
<button onclick="openModal()">+ Agregar</button>
</div>
</div>

</div>

<!-- NAV -->
<div class="bottom-nav">
<button class="nav-item active" onclick="showView('home', this)">Inicio</button>
<button class="nav-item" onclick="showView('schedules', this)">Horarios</button>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<h3>Nuevo horario</h3>
<input type="time" class="form-input" id="modal-time">
<input type="number" class="form-input" id="modal-grams" placeholder="gramos">
<button onclick="saveSchedule()">Guardar</button>
<button onclick="closeModal()">Cancelar</button>
</div>

<script>

// navegación
function showView(name, el) {
  document.getElementById('view-home').style.display = 'none';
  document.getElementById('view-schedules').style.display = 'none';
  document.getElementById('view-' + name).style.display = 'block';

  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
}

// modal
function openModal(){document.getElementById('modal').style.display='block'}
function closeModal(){document.getElementById('modal').style.display='none'}

// UI horarios
let schedules = [];

function renderSchedules(){
  const list = document.getElementById('schedule-list');
  list.innerHTML = schedules.map(s => `<div>${s.time} - ${s.grams}g</div>`).join('');
}

// guardar
function saveSchedule(){
  const time = document.getElementById('modal-time').value;
  const grams = parseInt(document.getElementById('modal-grams').value);

  if(!time || !grams){
    alert("Completa datos");
    return;
  }

  const data = { time, grams };

  if(window.guardarEnFirebase){
    window.guardarEnFirebase(data)
    .then(()=>alert("Guardado en Firebase"))
    .catch(()=>alert("Error al guardar"));
  }else{
    alert("Firebase no conectado");
  }

  schedules.push(data);
  renderSchedules();
  closeModal();
}

// dispensar
function dispense(){
  alert("Comida enviada");
}

</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "comedero-iot-7fa48.firebaseapp.com",
  databaseURL: "https://comedero-iot-7fa48-default-rtdb.firebaseio.com",
  projectId: "comedero-iot-7fa48"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.guardarEnFirebase = function(data){
  return set(ref(db, 'comedero/horarios/' + Date.now()), data);
};

console.log("Firebase conectado");
</script>

</body>
</html>
