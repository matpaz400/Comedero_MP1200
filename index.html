<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PawFeeder — Comedero inteligente</title>
</head>

<body>

<h2>Comedero inteligente</h2>

<!-- BOTÓN DE PRUEBA -->
<input type="time" id="modal-time">
<input type="number" id="modal-grams" placeholder="gramos">
<button onclick="saveSchedule()">Guardar horario</button>

<p id="status"></p>

<!-- ========================= -->
<!-- TU SCRIPT NORMAL (NO MODULE) -->
<!-- ========================= -->
<script>
function showToast(msg) {
  document.getElementById("status").innerText = msg;
}

function saveSchedule() {
  const time = document.getElementById('modal-time').value;
  const grams = parseInt(document.getElementById('modal-grams').value);

  if (!time || !grams) {
    showToast("Completa los datos");
    return;
  }

  const data = {
    time: time,
    grams: grams,
    enabled: true
  };

  if (window.guardarEnFirebase) {
    window.guardarEnFirebase(data)
      .then(() => showToast("✅ Guardado en Firebase"))
      .catch(() => showToast("❌ Error al guardar"));
  } else {
    showToast("Firebase no conectado");
  }
}
</script>

<!-- ========================= -->
<!-- FIREBASE (MODULE SEPARADO) -->
<!-- ========================= -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDs4xTL_SHEurv01MJstfA1IeUDJdwnnLY",
  authDomain: "comedero-iot-7fa48.firebaseapp.com",
  databaseURL: "https://console.firebase.google.com/u/0/project/comedero-iot-7fa48/database/comedero-iot-7fa48-default-rtdb/data/~2F",
  projectId: "comedero-iot-7fa48",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 👉 función global para usar desde tu otro script
window.guardarEnFirebase = function(data) {
  return set(ref(db, 'comedero/horarios/' + Date.now()), data);
}
</script>

</body>
</html>
